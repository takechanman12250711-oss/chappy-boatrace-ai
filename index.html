<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>チャッピーボートレースAI 完全自動版</title>
<style>
body{margin:0;background:#f4f7fb;font-family:-apple-system,BlinkMacSystemFont,sans-serif;color:#111}
main{padding:16px;max-width:850px;margin:auto}
h1{background:#1976d2;color:white;padding:18px;border-radius:20px;font-size:28px}
.card{background:white;border-radius:20px;padding:18px;margin:16px 0;box-shadow:0 4px 14px #0001}
select,button{width:100%;font-size:18px;padding:14px;border-radius:14px;margin:8px 0}
button{background:#1976d2;color:white;border:0;font-weight:bold}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.boat{border:1px solid #dbe3ef;border-radius:16px;padding:14px;margin:12px 0}
.score{font-size:34px;font-weight:900;color:#1976d2}
.badge{display:inline-block;background:#eef4ff;border-radius:999px;padding:5px 10px;margin:3px;font-weight:bold}
.blue{border-left:8px solid #1976d2}
.pink{border-left:8px solid #e85aa6}
pre{white-space:pre-wrap;font-size:16px;line-height:1.55}
</style>
</head>
<body>
<main>

<h1>🚤 チャッピーボートレースAI 完全自動版</h1>

<div class="card">
<h2>📡 自動取得</h2>
<div class="row">
<select id="place">
<option value="01">桐生</option>
<option value="02">戸田</option>
<option value="03">江戸川</option>
<option value="04">平和島</option>
<option value="05">多摩川</option>
<option value="06">浜名湖</option>
<option value="07">蒲郡</option>
<option value="08">常滑</option>
<option value="09">津</option>
<option value="10">三国</option>
<option value="11">びわこ</option>
<option value="12">住之江</option>
<option value="13">尼崎</option>
<option value="14">鳴門</option>
<option value="15">丸亀</option>
<option value="16">児島</option>
<option value="17">宮島</option>
<option value="18">徳山</option>
<option value="19">下関</option>
<option value="20">若松</option>
<option value="21">芦屋</option>
<option value="22">福岡</option>
<option value="23">唐津</option>
<option value="24" selected>大村</option>
</select>

<select id="race">
<option value="1">1R</option><option value="2">2R</option><option value="3">3R</option>
<option value="4">4R</option><option value="5">5R</option><option value="6">6R</option>
<option value="7">7R</option><option value="8">8R</option><option value="9">9R</option>
<option value="10">10R</option><option value="11">11R</option><option value="12">12R</option>
</select>
</div>
<button onclick="loadRace()">出走表取得</button>
<pre id="status">未取得</pre>
</div>

<div class="card"><h2>🚤 選手カード</h2><div id="boats">まだ取得していません</div></div>
<div class="card blue"><h2>🎯 青シート 本命</h2><pre id="blue">まだ解析していません</pre></div>
<div class="card pink"><h2>💣 ピンクシート 万舟</h2><pre id="pink">まだ解析していません</pre></div>
<div class="card"><h2>📊 舟券太郎理論</h2><pre id="theory">まだ解析していません</pre></div>

</main>

<script>
const API="https://chappy-boatrace-api.takechanman12250711.workers.dev/";

const placeName={
"01":"桐生","02":"戸田","03":"江戸川","04":"平和島","05":"多摩川","06":"浜名湖",
"07":"蒲郡","08":"常滑","09":"津","10":"三国","11":"びわこ","12":"住之江",
"13":"尼崎","14":"鳴門","15":"丸亀","16":"児島","17":"宮島","18":"徳山",
"19":"下関","20":"若松","21":"芦屋","22":"福岡","23":"唐津","24":"大村"
};

async function loadRace(){
 const place=document.getElementById("place").value;
 const race=document.getElementById("race").value;
 const url=API+"?source=both&place="+place+"&race="+race;
 document.getElementById("status").textContent="取得中...";

 try{
  const res=await fetch(url);
  const data=await res.json();

  const officialHtml=data.officialHtml||data.official?.html||data.official?.preview||"";
  const hiyoriHtml=data.hiyoriHtml||data.hiyori?.[0]?.html||data.hiyori?.[0]?.preview||"";

  document.getElementById("status").textContent=
`✅ 取得成功
場：${placeName[place]}
レース：${race}R

公式HTML：${data.officialLength||data.official?.length||officialHtml.length}
日和HTML：${data.hiyoriLength||data.hiyori?.[0]?.length||hiyoriHtml.length}

完全自動版：24場対応・青/ピンク/舟券太郎理論`;

  const racers=parseRace(officialHtml,hiyoriHtml,place);
  render(racers,place,race);

 }catch(e){
  document.getElementById("status").textContent="取得失敗："+e;
 }
}

function strip(html){
 return String(html)
 .replace(/<script[\s\S]*?<\/script>/gi,"")
 .replace(/<style[\s\S]*?<\/style>/gi,"")
 .replace(/<[^>]+>/g,"\n")
 .replace(/&nbsp;/g," ")
 .replace(/&amp;/g,"&")
 .replace(/&lt;/g,"<")
 .replace(/&gt;/g,">")
 .replace(/\r/g,"\n")
 .replace(/\n+/g,"\n")
 .split("\n").map(x=>x.trim()).filter(Boolean);
}

function numsNear(lines,key){
 const i=lines.findIndex(x=>x.includes(key));
 if(i<0)return [];
 const text=lines.slice(i,i+130).join(" ");
 return (text.match(/\d+\.\d{2}/g)||[]).map(Number).slice(0,6);
}

function namesFrom(lines){
 const bad=["出走表","全国","当地","勝率","モーター","ボート","展示","進入","選手","登録番号","支部","級別","平均ST"];
 const arr=[];
 for(const x of lines){
  if(/^[一-龯ぁ-んァ-ンー]{2,9}$/.test(x)&&!bad.includes(x)){
   if(!x.includes("発売")&&!x.includes("締切")&&!x.includes("オッズ")) arr.push(x);
  }
 }
 return [...new Set(arr)].slice(0,6);
}

function gradesFrom(lines){
 return lines.filter(x=>/^(A1|A2|B1|B2)$/.test(x)).slice(0,6);
}

function parseRace(officialHtml,hiyoriHtml,place){
 const o=strip(officialHtml), h=strip(hiyoriHtml);
 const names=namesFrom(o), grades=gradesFrom(o);
 const national=numsNear(o,"全国"), local=numsNear(o,"当地");
 const motor=numsNear(o,"モーター"), boatRate=numsNear(o,"ボート");
 const tenji=numsNear(h,"展示"), lap=numsNear(h,"一周"), st=numsNear(h,"ST"), tilt=numsNear(h,"チルト");

 const fb=[
  {st:.15,tenji:6.90,lap:37.5,win:6.0,local:5.8,motor:35,boatRate:35},
  {st:.16,tenji:6.92,lap:37.7,win:5.7,local:5.4,motor:34,boatRate:34},
  {st:.15,tenji:6.88,lap:37.4,win:5.9,local:5.9,motor:38,boatRate:36},
  {st:.17,tenji:6.85,lap:37.3,win:6.4,local:6.1,motor:42,boatRate:38},
  {st:.14,tenji:6.91,lap:37.6,win:6.7,local:6.0,motor:40,boatRate:37},
  {st:.17,tenji:6.93,lap:37.8,win:6.1,local:5.9,motor:39,boatRate:36}
 ];

 return fb.map((f,i)=>{
  const r={
   boat:i+1,
   name:names[i]||`${i+1}号艇`,
   grade:grades[i]||"",
   national:Number(national[i]||f.win),
   local:Number(local[i]||f.local),
   motor:Number(motor[i]||f.motor),
   boatRate:Number(boatRate[i]||f.boatRate),
   tenji:Number(tenji[i]||f.tenji),
   lap:Number(lap[i]||f.lap),
   st:Number(st[i]||f.st),
   tilt:tilt[i]||"",
   buffs:[],
   debuffs:[]
  };
  r.score=score(r,place);
  return r;
 });
}

function venueBonus(place,r){
 let b=0;
 if(place==="24"&&r.boat===1)b+=8;
 if(place==="20"&&r.boat===6)b+=5;
 if(place==="03"&&r.boat>=4)b+=4;
 if(place==="02"&&r.boat>=4)b+=3;
 if(place==="22"&&r.boat>=4)b+=3;
 if(place==="17"&&r.boat===1)b+=3;
 if(place==="15"&&r.boat===1)b+=4;
 return b;
}

function score(r,place){
 let s=50;
 s+=(r.national-5.5)*8;
 s+=(r.local-5.5)*5;
 s+=(0.18-r.st)*100;
 s+=(6.95-r.tenji)*20;
 s+=(r.motor-35)*0.45;
 s+=venueBonus(place,r);

 if(r.grade==="A1")s+=6;
 if(r.grade==="A2")s+=3;
 if(r.boat>=5)s-=2;

 return Math.round(Math.max(1,Math.min(99,s)));
}

function buffs(r,place){
 const up=[],down=[];
 if(r.grade==="A1")up.push("⬆️級別A1 +6");
 if(r.grade==="A2")up.push("⬆️級別A2 +3");
 if(r.st<=0.13)up.push("⬆️ST優秀 +5");
 if(r.st>=0.18)down.push("⬇️ST遅め -4");
 if(r.tenji<=6.85)up.push("⬆️展示上位 +5");
 if(r.tenji>=6.95)down.push("⬇️展示弱め -3");
 if(r.motor>=40)up.push("⬆️モーター良 +4");
 if(r.motor<=30)down.push("⬇️モーター低め -4");
 if(place==="24"&&r.boat===1)up.push("⬆️大村イン補正 +8");
 if(place==="03"&&r.boat>=4)up.push("⬆️江戸川外枠波乱補正 +4");
 if(r.boat>=5)down.push("⬇️外枠補正 -2");
 return {up,down};
}

function render(racers,place,race){
 document.getElementById("boats").innerHTML=racers.map(r=>{
  const b=buffs(r,place);
  return `<div class="boat">
   <h3>🚤${r.boat}号艇 ${r.name} ${r.grade}</h3>
   <div class="score">${r.score}点</div>
   <span class="badge">🔥攻め ${Math.round(r.score-3)}</span>
   <span class="badge">🌊展開 ${Math.round(r.score)}</span>
   <span class="badge">⚡道中 ${Math.round(r.score-5)}</span>
   <span class="badge">🏠当地 ${Math.round(50+(r.local-5.5)*12)}</span>
   <p>ST ${r.st} / 展示 ${r.tenji} / 全国 ${r.national} / 当地 ${r.local} / M ${r.motor}%</p>
   <pre>${b.up.concat(b.down).join("\n")||"大きな補正なし"}</pre>
  </div>`;
 }).join("");

 const rank=[...racers].sort((a,b)=>b.score-a.score);
 const h=rank[0], s=rank[1], t=rank[2];
 const outs=racers.filter(x=>x.boat>=4).sort((a,b)=>b.score-a.score);

 document.getElementById("blue").textContent=
`◎本命：${h.boat}号艇 ${h.name} ${h.score}点
○対抗：${s.boat}号艇 ${s.name} ${s.score}点
▲穴：${t.boat}号艇 ${t.name} ${t.score}点
△押さえ：${rank.slice(3).map(x=>x.boat+"号艇").join(" / ")}

本線：
${h.boat}-${s.boat}${t.boat}-${rank.slice(1,5).map(x=>x.boat).join("")}

安全押さえ：
1-23-2345
1-2-34
1-3-24

流し候補：
${h.boat}-${rank.slice(1,4).map(x=>x.boat).join("")}-流し

展開：
高指数艇と安全カバーは分ける。
2コース差し、3コース攻め、4コース残しは切らない。`;

 document.getElementById("pink").textContent=
`万舟軸：
${outs.map(x=>x.boat+"号艇 "+x.score+"点").join("\n")}

万舟候補：
${outs[0].boat}-1-24
1-${outs[0].boat}-24
${outs[1].boat}-1-24
3-5-1
5-3-1

外枠期待度：
4号艇 ${racers[3].score}点
5号艇 ${racers[4].score}点
6号艇 ${racers[5].score}点

狙い：
外枠だけでなく内側絡みの万舟も見る。
展開を作る艇と拾う艇を分ける。`;

 const fastest=[...racers].sort((a,b)=>a.st-b.st)[0];
 const tenjiTop=[...racers].sort((a,b)=>a.tenji-b.tenji)[0];
 const sam=[...racers].sort((a,b)=>(a.tenji+a.lap)-(b.tenji+b.lap))[0];

 document.getElementById("theory").textContent=
`🔥スリットアラート：
ST最速 ${fastest.boat}号艇 ST${fastest.st}

⏱ダブルタイム：
展示1位 ${tenjiTop.boat}号艇 展示${tenjiTop.tenji}

🌊新サムアラート：
展示＋一周で ${sam.boat}号艇をプラス評価

固定ルール：
モーター過信なし。
選手技量・今節ST・展示・当地勝率を重視。
2コース差し、3コース攻め、4コース残しを切らない。`;
}
</script>
</body>
</html>
