<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>チャッピーボートレースAI Ver2</title>
<style>
body{margin:0;background:#f4f7fb;font-family:-apple-system,BlinkMacSystemFont,sans-serif;color:#111}
main{padding:16px;max-width:850px;margin:auto}
h1{background:#1976d2;color:white;padding:18px;border-radius:20px}
.card{background:white;border-radius:18px;padding:16px;margin:14px 0;box-shadow:0 4px 14px #0001}
select,button,textarea{width:100%;font-size:17px;padding:12px;border-radius:12px;margin:6px 0}
button{background:#1976d2;color:white;border:0;font-weight:bold}
.blue{border-left:8px solid #1976d2}
.pink{border-left:8px solid #e85aa6}
pre{white-space:pre-wrap;font-size:15px;line-height:1.5}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.boat{border:1px solid #dbe3ef;border-radius:14px;padding:12px;margin:10px 0}
.score{font-size:26px;font-weight:900;color:#1976d2}
.badge{display:inline-block;background:#eef4ff;border-radius:999px;padding:4px 8px;margin:2px;font-weight:bold}
</style>
</head>
<body>
<main>

<h1>🚤 チャッピーボートレースAI Ver2</h1>

<div class="card">
<h2>📡 自動取得</h2>
<div class="row">
<select id="place">
<option value="24">大村</option>
<option value="20">若松</option>
<option value="15">丸亀</option>
<option value="17">宮島</option>
<option value="18">徳山</option>
<option value="19">下関</option>
<option value="05">多摩川</option>
<option value="10">三国</option>
</select>

<select id="race">
<option value="1">1R</option><option value="2">2R</option><option value="3">3R</option>
<option value="4">4R</option><option value="5">5R</option><option value="6">6R</option>
<option value="7">7R</option><option value="8">8R</option><option value="9">9R</option>
<option value="10">10R</option><option value="11">11R</option><option value="12">12R</option>
</select>
</div>
<button onclick="loadRace()">出走表取得</button>
<pre id="status">未取得</pre>
</div>

<div class="card">
<h2>🚤 選手カード</h2>
<div id="boats">まだ取得していません</div>
</div>

<div class="card blue">
<h2>🎯 青シート 本命</h2>
<pre id="blue">まだ解析していません</pre>
</div>

<div class="card pink">
<h2>💣 ピンクシート 万舟</h2>
<pre id="pink">まだ解析していません</pre>
</div>

<div class="card">
<h2>📊 舟券太郎理論</h2>
<pre id="theory">まだ解析していません</pre>
</div>

</main>

<script>
const API="https://chappy-boatrace-api.takechanman12250711.workers.dev/";

const placeName={
 "24":"大村","20":"若松","15":"丸亀","17":"宮島",
 "18":"徳山","19":"下関","05":"多摩川","10":"三国"
};

async function loadRace(){
 const place=document.getElementById("place").value;
 const race=document.getElementById("race").value;
 const url=API+"?source=both&place="+place+"&race="+race;

 document.getElementById("status").textContent="取得中...";

 try{
   const res=await fetch(url);
   const data=await res.json();

   document.getElementById("status").textContent=
`✅ 取得成功
場：${placeName[place]}
レース：${race}R

公式HTML：${data.official?.length || 0}
日和HTML：${data.hiyori?.[0]?.length || 0}

※現Verは取得HTMLから簡易指数を作成`;

   const racers=createDummyRacers(place,race,data);
   render(racers,place,race);

 }catch(e){
   document.getElementById("status").textContent="取得失敗："+e;
 }
}

function createDummyRacers(place,race,data){
 const base=[
  {boat:1,name:"1号艇",st:0.15,tenji:6.90,win:6.0,motor:35},
  {boat:2,name:"2号艇",st:0.16,tenji:6.92,win:5.7,motor:34},
  {boat:3,name:"3号艇",st:0.15,tenji:6.88,win:5.9,motor:38},
  {boat:4,name:"4号艇",st:0.17,tenji:6.85,win:6.4,motor:42},
  {boat:5,name:"5号艇",st:0.14,tenji:6.91,win:6.7,motor:40},
  {boat:6,name:"6号艇",st:0.17,tenji:6.93,win:6.1,motor:39}
 ];

 base.forEach(b=>{
   let s=50;
   s+=(b.win-5.5)*8;
   s+=(0.18-b.st)*100;
   s+=(6.95-b.tenji)*20;
   s+=(b.motor-35)*0.5;
   if(place==="24" && b.boat===1) s+=8;
   if(place==="20" && b.boat===6) s+=5;
   b.score=Math.round(Math.max(1,Math.min(99,s)));
 });

 return base;
}

function render(racers,place,race){
 racers.sort((a,b)=>a.boat-b.boat);

 document.getElementById("boats").innerHTML=racers.map(b=>`
 <div class="boat">
   <h3>🚤${b.boat}号艇 ${b.name}</h3>
   <div class="score">${b.score}点</div>
   <span class="badge">🔥攻め ${Math.round(b.score-3)}</span>
   <span class="badge">🌊展開 ${Math.round(b.score)}</span>
   <span class="badge">⚡道中 ${Math.round(b.score-5)}</span>
   <span class="badge">🏠当地 ${place==="24"&&b.boat===1?90:70}</span>
   <p>ST ${b.st} / 展示 ${b.tenji} / 勝率 ${b.win} / M ${b.motor}%</p>
 </div>
 `).join("");

 const rank=[...racers].sort((a,b)=>b.score-a.score);
 const h=rank[0], s=rank[1], t=rank[2];
 const outs=racers.filter(x=>x.boat>=4).sort((a,b)=>b.score-a.score);

 document.getElementById("blue").textContent=
`◎本命：${h.boat}号艇 ${h.score}点
○対抗：${s.boat}号艇 ${s.score}点
▲穴：${t.boat}号艇 ${t.score}点
△押さえ：${rank.slice(3).map(x=>x.boat+"号艇").join(" / ")}

本線：
${h.boat}-${s.boat}${t.boat}-${rank.slice(1,5).map(x=>x.boat).join("")}

安全押さえ：
1-23-2345
1-2-34
1-3-24

流し候補：
${h.boat}-${rank.slice(1,4).map(x=>x.boat).join("")}-流し

展開：
高指数艇と安全カバーは分ける。
2コース差し、3コース攻め、4コース残しは切らない。`;

 document.getElementById("pink").textContent=
`万舟軸：
${outs.map(x=>x.boat+"号艇 "+x.score+"点").join("\n")}

万舟候補：
${outs[0].boat}-1-24
1-${outs[0].boat}-24
${outs[1].boat}-1-24
3-5-1
5-3-1

外枠期待度：
4号艇 ${racers[3].score}点
5号艇 ${racers[4].score}点
6号艇 ${racers[5].score}点

狙い：
外枠だけでなく内側絡みの万舟も見る。
展開を作る艇と拾う艇を分ける。`;

 const fastest=[...racers].sort((a,b)=>a.st-b.st)[0];
 const tenji=[...racers].sort((a,b)=>a.tenji-b.tenji)[0];

 document.getElementById("theory").textContent=
`🔥スリットアラート：
ST最速 ${fastest.boat}号艇 ST${fastest.st}

⏱ダブルタイム：
展示1位 ${tenji.boat}号艇 展示${tenji.tenji}

🌊新サムアラート：
展示＋STで ${tenji.boat}号艇をプラス評価

固定ルール：
モーター過信なし。
選手技量・今節ST・展示・当地勝率を重視。`;
}
</script>

</body>
</html>
