<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>チャッピーボートレースAI</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="app-header">
    <h1>🚤 チャッピーボートレースAI</h1>
  </header>

  <main class="app">

    <section class="control-card">
      <h2>レース選択</h2>

      <label>日付</label>
      <input id="dateInput" type="text" placeholder="例：20260624 / 2026/06/24" />

      <label>場</label>
      <select id="placeSelect">
        <option>桐生</option><option>戸田</option><option>江戸川</option><option>平和島</option>
        <option>多摩川</option><option>浜名湖</option><option>蒲郡</option><option>常滑</option>
        <option>津</option><option>三国</option><option>びわこ</option><option>住之江</option>
        <option>尼崎</option><option>鳴門</option><option>丸亀</option><option>児島</option>
        <option>宮島</option><option>徳山</option><option>下関</option><option>若松</option>
        <option>芦屋</option><option>福岡</option><option>唐津</option><option>大村</option>
      </select>

      <label>レース</label>
      <select id="raceSelect">
        <option value="1">1R</option>
        <option value="2">2R</option>
        <option value="3">3R</option>
        <option value="4">4R</option>
        <option value="5">5R</option>
        <option value="6">6R</option>
        <option value="7">7R</option>
        <option value="8">8R</option>
        <option value="9">9R</option>
        <option value="10">10R</option>
        <option value="11">11R</option>
        <option value="12">12R</option>
      </select>

      <button id="fetchRaceBtn">出走表取得して予想</button>

      <div id="statusText" class="status">未取得</div>
    </section>

    <section class="panel">
      <h2>🚤 出走表一覧</h2>
      <div id="raceListArea">まだ取得していません</div>
    </section>

    <section class="panel">
      <h2>🌊 水面・モーター情報</h2>
      <div id="engineArea"></div>
    </section>

    <section class="panel blue-panel">
      <h2>🎯 本命シート</h2>
      <div id="mainSheetArea"></div>
    </section>

    <section class="panel">
      <h2>🎫 フォーメーション</h2>
      <div id="formationArea"></div>
      
    </section>
    <section class="panel">
  <h2>💰 オッズ TOP12</h2>
  <div id="oddsArea"></div>
  </section>
    
    <section class="panel pink-panel">
      <h2>💣 万舟シート</h2>
      <div id="manshuSheetArea"></div>
    </section>

    <section class="panel">
      <h2>🚨 理論アラート</h2>
      <div id="alertArea"></div>
    </section>

    <section class="panel">
  <h2>📈 成績入力</h2>

  <div class="result-buttons">
    <button id="hitBtn" type="button">⭕ アタリ</button>
    <button id="missBtn" type="button">❌ ハズレ</button>
  </div>

  <label>購入金額</label>
  <input id="betAmountInput" type="number" placeholder="例：1000">

  <label>払戻金</label>
  <input id="payoutInput" type="number" placeholder="例：3200">

  <button id="saveResultBtn" type="button">
    成績を保存
  </button>

  <div id="statsArea"></div>
</section>

    <div id="result"></div>

  </main>

  <script src="script.js?v=8.5"></script>
</body>
</html>
