<!doctype html>

<html lang="ja">

<head>

<meta charset="utf-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>チャッピーボートレースAI</title>

<style>

body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f4f7fb;margin:0;padding:16px;color:#111}

h1{background:#1688e8;color:white;padding:18px;border-radius:18px;font-size:24px}

.card{background:white;border-radius:18px;padding:16px;margin:14px 0;box-shadow:0 4px 14px #0001}

textarea{width:100%;height:180px;font-size:16px;border-radius:14px;padding:12px}

button{background:#1688e8;color:white;border:0;border-radius:999px;padding:14px 20px;font-size:18px;font-weight:bold}

.blue{border-left:8px solid #1688e8}

.pink{border-left:8px solid #f062aa}

pre{white-space:pre-wrap;font-size:15px}

</style>

</head>

<body>

<h1>🚤 チャッピーボートレースAI</h1>

<div class="card">

  <h2>📥 出走表を貼り付け</h2>

  <textarea id="input" placeholder="ここに出走表・展示・OCR文字を貼る"></textarea>

  <br><br>

  <button onclick="analyze()">解析する</button>

</div>

<div class="card blue">

  <h2>🎯 青シート 本命</h2>

  <pre id="blue">まだ解析していません</pre>

</div>

<div class="card pink">

  <h2>💣 ピンクシート 万舟</h2>

  <pre id="pink">まだ解析していません</pre>

</div>

<div class="card">

  <h2>📊 舟券太郎理論</h2>

  <pre id="theory">まだ解析していません</pre>

</div>

<script>

function analyze(){

  const text=document.getElementById("input").value.trim();

  if(!text){

    alert("出走表を貼ってね");

    return;

  }

  document.getElementById("blue").textContent =

`◎本命：1号艇

○対抗：2号艇

▲穴：3号艇

△押さえ：4・5号艇

本線：

1-23-2345

安全押さえ：

1-2-34

1-3-24

流し候補：

1-234-流し

展開：

イン中心。ただし2コース差し、3コース攻め、4コース残しは切らない。`;

  document.getElementById("pink").textContent =

`万舟軸：

4号艇・5号艇・6号艇

万舟候補：

4-1-2

5-1-2

6-1-2

3-5-1

5-3-1

狙い：

外枠だけでなく、内側絡みの万舟も見る。`;

  document.getElementById("theory").textContent =

`🔥スリットアラート：

ST差0.10以上があれば発動

⏱ダブルタイム：

展示1位＋一周1位を重視

🌊新サムアラート：

展示タイム＋一周タイム上位をプラス評価

固定ルール：

モーター過信なし

選手技量・今節ST・展示・当地を重視`;

}

</script>

</body>

</html>
